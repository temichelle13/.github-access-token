---
name: Access Token Check

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-token:
    runs-on: ubuntu-latest
    steps:
      - name: Verify token secret is configured
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ACCESS_TOKEN secret is not configured."
            exit 1
          fi

          echo "ACCESS_TOKEN secret is configured."
